title: lmeldrum.dev 
copyright: "© 2025, Llewellyn Meldrum"
theme: [PaperMod]
publishDir: ../www/

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts"]

minify:
  disableXML: true
  # minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 5

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Home 
          url: /
          weight: 5
        - name: Archive
          url: archives/
          weight: 10

        #- name: Archive
        #  url: archives
        #  weight: 5
        #- name: Search
        #  url: search/
        #  weight: 10
        #- name: Tags
        #  url: tags/
        #  weight: 10
        #- name: WiKi
        #  url: https://github.com/adityatelange/hugo-PaperMod/wiki/

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
  author: Llewellyn Meldrum
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  disableThemeToggle: false
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["images/papermod-cover.png"]

  homeInfoParams:
    aboutMe: >
      # ABOUT ME:
      
      - I'm a 2nd year Software Engineering student at [MQU](https://en.wikipedia.org/wiki/Macquarie_University).

      - I'm interested in **low level/systems programming**.

      - I'm a diehard user of [C (programming language)](https://en.wikipedia.org/wiki/C_(programming_language)).
      
      <br>
    siteAim: >
      # SITE PURPOSE: 
        - document a few of my favourite projects i've worked on
        - act as the frontend for my C HTTP server. 

      <br>
    theBackend: >
      # SITE BACKEND: 
     
      The backend of this site is a HTTP server I wrote in C with `sockets.h`! Its actually pretty simple.

        - Check out the details [here](posts/c_http_server),

        - or the repo [here.](https://github.com/llewellynmeldrum/http-server)


      <br>
    projectsPrelude: >
      # PROJECTS
        etc...

    contactsFooter: >
      # Contacts:

      #### [github](https://github.com/llewellynmeldrum/http-server)  | [linkedin](https://www.linkedin.com/in/llewie-meldrum-978839258/) | [gmail](mailto:llewie.meldrum@gmail.com)
  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/llewellynmeldrum/http-server"
    - name: Linkedin 
      title: Check out my Linkedin 
      url: "https://www.linkedin.com/in/llewie-meldrum-978839258/"
    - name: email 
      title: Contact me via gmail! 
      url: "mailto:llewie.meldrum@gmail.com"


