		(function () {
			const SITE_KEY = 'anim:site-once';
			const nav = performance.getEntriesByType('navigation')[0];
			const isReload = nav && nav.type === 'reload';

			
			
			
			const shouldPlay = isReload || !sessionStorage.getItem(SITE_KEY);

			if (shouldPlay) {
				document.documentElement.classList.add('play-anim');
				
				sessionStorage.setItem(SITE_KEY, '1');
			}

			
			document.documentElement.style.setProperty('--anim-played', '1');
			if (isReload && 'scrollRestoration' in history) {
				history.scrollRestoration = 'manual';
				window.scrollTo(0, 0);
				window.addEventListener('load', () => window.scrollTo(0, 0), {once: true});
			}
		})();

	var mybutton = document.getElementById("top-link");

	};
